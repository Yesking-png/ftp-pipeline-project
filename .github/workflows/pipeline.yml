name: FTP Pipeline CI/CD

on:
  push:
    branches:
      - main

jobs:
  validate:
    name: Stage 1 - Validate Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Check files exist
        run: |
          echo "Checking project files..."
          ls -la
          echo "Validation complete"

  build:
    name: Stage 2 - Build Docker Image
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t ftp-pipeline .

      - name: Confirm image built
        run: docker images ftp-pipeline

  test:
    name: Stage 3 - Run Application
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run good data generator
        run: |
          pip install requests
          python good_data_generator.py

      - name: Run bad data generator
        run: python bad_data_generator.py
